name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    # Fetch the hts dependency straight from GitHub (not the public module
    # proxy/sumdb), so a freshly pushed hts tag is visible to this build
    # immediately and "go get hts@latest" resolves it without proxy-cache lag.
    env:
      GOPRIVATE: github.com/compgenlab/*

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Remote/CI builds use the latest released hts from GitHub. Local builds
      # instead use the live sibling checkout via the go.work workspace.
      - name: Use latest hts from GitHub
        run: GOCACHE=/tmp/go-build-cache go get github.com/compgenlab/hts@latest

      - name: Install samtools
        run: sudo apt-get update && sudo apt-get install -y samtools

      - name: Run go vet
        run: GOCACHE=/tmp/go-build-cache go vet ./...

      - name: Run tests
        run: GOCACHE=/tmp/go-build-cache go test ./...

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi
          echo "git_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          LDFLAGS: >-
            -X 'github.com/compgenlab/cgkit/internal/cmd.Version=${{ steps.version.outputs.version }}'
            -X 'github.com/compgenlab/cgkit/internal/cmd.GitHash=${{ steps.version.outputs.git_hash }}'
        run: |
          mkdir -p bin
          GOOS=darwin  GOARCH=arm64                go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgkit.darwin_arm64  .
          GOOS=darwin  GOARCH=amd64                go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgkit.darwin_amd64  .
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0  go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgkit.linux_arm64   .
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0  go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgkit.linux_amd64   .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0  go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgkit.windows_amd64.exe .

      - name: Upload cgkit.darwin_arm64
        uses: actions/upload-artifact@v7
        with:
          name: cgkit.darwin_arm64
          path: bin/cgkit.darwin_arm64

      - name: Upload cgkit.darwin_amd64
        uses: actions/upload-artifact@v7
        with:
          name: cgkit.darwin_amd64
          path: bin/cgkit.darwin_amd64

      - name: Upload cgkit.linux_arm64
        uses: actions/upload-artifact@v7
        with:
          name: cgkit.linux_arm64
          path: bin/cgkit.linux_arm64

      - name: Upload cgkit.linux_amd64
        uses: actions/upload-artifact@v7
        with:
          name: cgkit.linux_amd64
          path: bin/cgkit.linux_amd64

      - name: Upload cgkit.windows_amd64
        uses: actions/upload-artifact@v7
        with:
          name: cgkit.windows_amd64.exe
          path: bin/cgkit.windows_amd64.exe

      - name: Create source archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          git archive --format=zip --prefix=cgkit-${VERSION}/ HEAD > dist/cgkit-${VERSION}-src.zip

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/cgkit.darwin_arm64
            bin/cgkit.darwin_amd64
            bin/cgkit.linux_arm64
            bin/cgkit.linux_amd64
            bin/cgkit.windows_amd64.exe
            dist/cgkit-*-src.zip

      - name: Create dev release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          make_latest: false
          body: |
            Automated build from main branch.

            **Commit:** ${{ github.sha }}
            **Version:** ${{ steps.version.outputs.version }}
          files: |
            bin/cgkit.darwin_arm64
            bin/cgkit.darwin_amd64
            bin/cgkit.linux_arm64
            bin/cgkit.linux_amd64
            bin/cgkit.windows_amd64.exe
            dist/cgkit-*-src.zip
