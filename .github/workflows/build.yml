name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install samtools
        run: sudo apt-get update && sudo apt-get install -y samtools

      - name: Run tests
        run: GOCACHE=/tmp/go-build-cache go test ./...

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi
          echo "git_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          LDFLAGS: >-
            -X 'github.com/compgen-io/cgltk/internal/cmd.Version=${{ steps.version.outputs.version }}'
            -X 'github.com/compgen-io/cgltk/internal/cmd.GitHash=${{ steps.version.outputs.git_hash }}'
        run: |
          mkdir -p bin
          GOOS=darwin  GOARCH=arm64                go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgltk.darwin_arm64  .
          GOOS=darwin  GOARCH=amd64                go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgltk.darwin_amd64  .
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0  go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgltk.linux_arm64   .
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0  go build -buildvcs=false -ldflags "$LDFLAGS" -o bin/cgltk.linux_amd64   .

      - name: Upload cgltk.darwin_arm64
        uses: actions/upload-artifact@v4
        with:
          name: cgltk.darwin_arm64
          path: bin/cgltk.darwin_arm64

      - name: Upload cgltk.darwin_amd64
        uses: actions/upload-artifact@v4
        with:
          name: cgltk.darwin_amd64
          path: bin/cgltk.darwin_amd64

      - name: Upload cgltk.linux_arm64
        uses: actions/upload-artifact@v4
        with:
          name: cgltk.linux_arm64
          path: bin/cgltk.linux_arm64

      - name: Upload cgltk.linux_amd64
        uses: actions/upload-artifact@v4
        with:
          name: cgltk.linux_amd64
          path: bin/cgltk.linux_amd64

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/cgltk.darwin_arm64
            bin/cgltk.darwin_amd64
            bin/cgltk.linux_arm64
            bin/cgltk.linux_amd64

      - name: Create dev release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          make_latest: false
          body: |
            Automated build from main branch.

            **Commit:** ${{ github.sha }}
            **Version:** ${{ steps.version.outputs.version }}
          files: |
            bin/cgltk.darwin_arm64
            bin/cgltk.darwin_amd64
            bin/cgltk.linux_arm64
            bin/cgltk.linux_amd64
